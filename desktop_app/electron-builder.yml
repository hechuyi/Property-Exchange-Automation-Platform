appId: com.peap.desktop
productName: 产权交易所自动录入
directories:
  output: dist
files:
  - main.js
  - preload.js
  - renderer.js
  - styles.css
  - index.html
  - backend_launch.js
  - backend_ready.js
  - package.json
asar: true
extraResources:
  - from: build/desktop_backend
    to: desktop_backend
    filter:
      - peap-desktop-backend
      - peap-desktop-backend.exe
mac:
  artifactName: "property-exchange-auto-entry-${version}-mac.${ext}"
  category: public.app-category.productivity
  target:
    - target: pkg
win:
  artifactName: "property-exchange-auto-entry-${version}-win.${ext}"
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
