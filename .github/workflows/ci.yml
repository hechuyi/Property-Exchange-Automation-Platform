name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.1"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Check lockfile
        run: uv lock --check

      - name: Sync project environment
        run: uv sync --locked

      - name: Ruff
        run: >
          uv run ruff check
          peap
          peap_core
          peap_parsers
          peap_postprocess
          tests
          bin
          config.py
          scripts/init_runtime_config.py
          scripts/prepare_submission.py

      - name: Unit tests
        run: uv run python -m pytest tests
